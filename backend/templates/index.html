<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div>
      <h1>WebSocket Chart</h1>
      <form id="message-form">
        <label for="message">Message:</label>
        <input
          type="text"
          id="message"
          name="message"
          placeholder="Type your message here..."
        />
        <button type="submit">Send</button>
      </form>
      <div id="chart-container" style="width: 80%; margin: 20px auto; position: relative; height: 400px;">
        <canvas id="chart-canvas"></canvas>
      </div>
      <div id="messages-container" style="width: 80%; margin: 20px auto; border: 1px solid #ccc; padding: 10px; max-height: 300px; overflow-y: auto; background-color: #f9f9f9;">
        <h3>Messages Log</h3>
        <ul id="messages-list" style="list-style: none; padding: 0;">
        </ul>
      </div>
    </div>

    <script>
      const ws = new WebSocket("ws://localhost:8000/ws");
      let chart;

      ws.onopen = () => {
        console.log("WebSocket connection established");
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log("WebSocket message received:", data);
        
        // Add message to log
        addMessageToLog(data);
        
        // Update chart if data contains a numeric value
        if (data.message) {
          const value = parseFloat(data.message);
          if (!isNaN(value)) {
            addDataToChart(value);
          }
        }
      };

      ws.onclose = () => {
        console.log("WebSocket connection closed");
      };

      ws.onerror = (error) => {
        console.error("WebSocket error:", error);
      };

      const form = document.getElementById("message-form");
      form.onsubmit = (event) => {
        event.preventDefault();
        const input = document.getElementById("message");
        const message = input.value;
        ws.send(JSON.stringify({ message }));
        input.value = "";
      };

      function addMessageToLog(data) {
        const messagesList = document.getElementById("messages-list");
        const li = document.createElement("li");
        const timestamp = new Date().toLocaleTimeString();
        li.style.padding = "5px";
        li.style.borderBottom = "1px solid #ddd";
        li.textContent = `[${timestamp}] ${typeof data.message === 'object' ? JSON.stringify(data.message) : data.message}`;
        messagesList.insertBefore(li, messagesList.firstChild);
        
        // Keep only last 50 messages
        while (messagesList.children.length > 50) {
          messagesList.removeChild(messagesList.lastChild);
        }
      }

      function addDataToChart(value) {
        if (!chart) return;
        
        const now = new Date();
        chart.data.labels.push(now);
        chart.data.datasets[0].data.push(value);
        
        // Keep only last 20 data points
        if (chart.data.labels.length > 20) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }
        
        chart.update();
      }

      const chartCanvas = document.getElementById("chart-canvas");
      const ctx = chartCanvas.getContext("2d");
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: [],
          datasets: [
            {
              label: "WebSocket Messages",
              data: [],
              borderColor: "rgba(75, 192, 192, 1)",
              backgroundColor: "rgba(75, 192, 192, 0.1)",
              borderWidth: 2,
              fill: true,
              tension: 0.4,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              type: "time",
              time: {
                unit: "second",
                displayFormats: {
                  second: "HH:mm:ss",
                },
              },
              title: {
                display: true,
                text: "Time",
              },
            },
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Value",
              },
            },
          },
          plugins: {
            legend: {
              display: true,
              position: "top",
            },
          },
        },
      });
    </script>
  </body>
</html>
